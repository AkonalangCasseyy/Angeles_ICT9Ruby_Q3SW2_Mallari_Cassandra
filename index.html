<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Seatwork 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: white;
            background-image: url("BACKGROUND_SW2.jpeg"); 
            background-size: cover;
            background-attachment: fixed;
        }

        footer {
        background-color: black;
        padding: 10px;
        text-align: center;
        }  

        .navbar {
            background-color: #003366;
            padding: 10px;
        }

        .main-container {
            border-radius: 15px;
            padding: 30px;
            margin-top: 50px;
            border: 1px solid #00d4ff;
            background-color: black;
            opacity: 0.9;
        }

        .brand-box, .store-box {
            padding: 15px;
            border-radius: 10px;
            height: 100%;
        }

        #result-display {
            font-weight: bold;
            color: #00ff00;
            font-size: 1.2rem;
        }

        .store-logo {
            max-width: 200px;
            background: white;
            padding: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar text-center">
        <div class="container-fluid d-flex justify-content-between">
            <h2 class="m-0">Product Locator</h2>
            <input type="text" placeholder="Search..." class="form-control w-25">
        </div>
    </nav>

    <div class="container main-container text-center">
        <h3>Want a gaming laptop? </h3>
        <p>Enter your budget and we'll find the perfect one for you!</p>
        
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <input type="number" id="budgetarea" class="form-control text-center" placeholder="Enter here...">
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-4">
                <div class="brand-box">
                    <h5>Brand & Discounts</h5>
                    <p><small>Recommended Brands:</small></p>
                    <a href="https://www.acer.com/us-en"><button class="btn btn-dark w-100 mb-2" onclick="showBrand('Acer')">Acer</button></a>

                    <a href="https://www.asus.com/ph/"><button class="btn btn-dark w-100 mb-2" onclick="showBrand('Asus')">Asus</button></a>

                    <a href="https://www.lenovo.com/us/en/?orgRef=https%253A%252F%252Fwww.google.com%252F&srsltid=AfmBOorTO6Yme0NRjI7qw0n-clxXccPQ0_IgixfXUVlUIjEX11vj-fDj"><button class="btn btn-dark w-100 mb-2" onclick="showBrand('Lenovo')">Lenovo</button></a>

                    <hr>
                    <p>You are eligible for: <span id="result-display">0.00</span></p>
                    <button class="btn btn-primary" onclick="calculateDiscount()">Find out Eligibility!</button>
                </div>
            </div>

            <div class="col-md-4 d-flex align-items-center justify-content-center">
                <div style="border: 2px solid #00d4ff; padding: 20px;">
                    <img src="CONTROLLER.jpeg" width="300">
                </div>
            </div>

            <div class="col-md-4">
                <div class="store-box">
                    <h5>Store Location</h5>
                    <div class="mb-3">
                        <img src="VILLMAN_LOGO.png" alt="VillMan" class="store-logo">
                        <p>Cyberzone, SM City Fairview Main Building</p>
                    </div>
                    <div class="mb-3">
                        <img src="SILICON_LOGO.png" width="210">
                        <p>SM City North EDSA Annex, Quezon City</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 mb-3">
        <p>© Cassandra Mallari</p>
    </footer>

    <script>
        function calculateDiscount() {
            let budget = Number(document.getElementById('budgetarea').value);
            let result = document.getElementById('result-display');

            if (budget >= 50000) {
                result.innerHTML = "PHP " + (budget * 0.10).toLocaleString() + " Discount!";
            } 

            else if (budget > 0) {
                result.innerHTML = "Standard Promo applied";
            } 

            else {
                result.innerHTML = "0.00";
                alert("Please enter a valid budget amount.");
            }
        }

    </script>

</body>
</html>
